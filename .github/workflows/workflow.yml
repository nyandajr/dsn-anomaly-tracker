name: DSN Anomaly Tracker

on:
  # schedule disabled 2026-07-07: migrated to a VM-based replacement
  # (vm_automation/run_and_push.py) -- GitHub Actions was only delivering
  # ~15% of this cadence in practice. To revert: uncomment the line below.
  # - cron: "3,23,43 * * * *"  # every 20 min, offset off :00 and staggered vs global-fuel-watch's identical old schedule
  workflow_dispatch:  # Manual trigger only, while the VM version is being tested

concurrency:
  group: dsn-anomaly-tracker-main
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  dsn-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run DSN pipeline
        run: python main.py

      - name: Commit and push updates
        run: |
          git config user.email "actions@github.com"
          git config user.name "DSN Bot"
          git fetch origin main
          git reset --soft origin/main
          git add data/history.csv outputs/signal_report.png models/baselines.json
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          if git diff --staged --quiet; then
            echo "No artifact changes to commit"
            exit 0
          fi
          git commit -m "chore: DSN update ${TIMESTAMP} [skip ci]"
          git push --force origin HEAD:main
