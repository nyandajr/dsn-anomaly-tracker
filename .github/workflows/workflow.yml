name: DSN Anomaly Tracker

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  dsn-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run DSN pipeline
        run: python main.py

      - name: Commit and push updates
        run: |
          git config user.email "actions@github.com"
          git config user.name "DSN Bot"
          git add data/history.csv outputs/signal_report.png models/baselines.json
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          git diff --staged --quiet || git commit -m "chore: DSN update ${TIMESTAMP}"
          git push
